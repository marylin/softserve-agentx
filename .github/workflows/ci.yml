name: CI - Build & Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -e ".[test]"

      - name: Run tests
        run: |
          cd backend
          pytest tests/ -v --tb=short

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: TypeScript check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build frontend
        run: |
          cd frontend
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for Docker build
        run: |
          cp .env.example .env

      - name: Build Docker Compose
        run: |
          docker compose build

      - name: Start services
        run: |
          docker compose up -d postgres
          sleep 5
          docker compose up -d backend
          sleep 10

      - name: Health check
        run: |
          curl -f http://localhost:8000/health || exit 1

      - name: Stop services
        if: always()
        run: |
          docker compose down -v
